<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ponto Inteligente DP — Painel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --azul:#2457EB;--azul2:#3B6FF0;--azul-leve:#EEF3FF;
  --ink:#0B1F41;--muted:#687A99;--linha:#E8EDF5;--bg:#F5F7FB;
  --vermelho:#E23B3B;--amarelo:#D97706;--verde:#19A64A;--roxo:#7D4CDB;
  --red-s:#FEE8E8;--yel-s:#FEF3DA;--blue-s:#EEF3FF;--grn-s:#E7F6EC;--gry-s:#F0F3F8;--pur-s:#F0ECFE;
  --r:18px;--r-sm:10px;--r-xs:8px;
  --sh:0 1px 3px rgba(11,31,65,.04),0 4px 16px rgba(11,31,65,.07);
  --sh-h:0 4px 14px rgba(11,31,65,.10),0 14px 36px rgba(11,31,65,.12);
}
/* ── RESET ── */
*{box-sizing:border-box} html,body{margin:0;height:100%}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer} .hidden{display:none!important}
/* ── LOGIN ── */
.login{max-width:400px;margin:8vh auto;background:#fff;border:1px solid var(--linha);border-radius:var(--r);padding:36px;box-shadow:var(--sh)}
.login h2{margin:0 0 6px;font-size:22px;font-weight:800}
.login p{margin:0 0 24px;color:var(--muted);font-size:13px}
.login label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.login input{width:100%;padding:12px 14px;border:1.5px solid var(--linha);border-radius:var(--r-sm);margin:6px 0 16px;font-size:15px;font-family:inherit;transition:border-color .15s;outline:none}
.login input:focus{border-color:var(--azul)}
.login button{width:100%;background:var(--azul);color:#fff;border:0;border-radius:var(--r-sm);padding:14px;font-size:15px;font-weight:700;transition:background .15s}
.login button:hover{background:var(--azul2)}
.erro{color:var(--vermelho);font-size:13px;min-height:18px;margin-top:6px}
/* ── APP SHELL ── */
#app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
/* ── SIDEBAR ── */
aside{background:linear-gradient(160deg,#0B2347 0%,#06162D 100%);color:#C5D4E8;padding:20px 14px 24px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
aside .brand{color:#fff;font-weight:800;font-size:15px;padding:6px 10px 20px;line-height:1.35;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:14px}
aside .brand small{display:block;color:#7B99C2;font-weight:500;font-size:11px;margin-top:3px;letter-spacing:.02em}
aside nav a{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;color:#8AAED4;font-size:13.5px;font-weight:500;margin-bottom:3px;cursor:pointer;transition:background .15s,color .15s;user-select:none;text-decoration:none}
aside nav a svg{flex-shrink:0;opacity:.7;transition:opacity .15s}
aside nav a:hover{background:rgba(255,255,255,.07);color:#fff}
aside nav a:hover svg{opacity:1}
aside nav a.on{background:var(--azul);color:#fff;font-weight:600;box-shadow:0 2px 12px rgba(36,87,235,.4)}
aside nav a.on svg{opacity:1}
aside nav a:focus-visible{outline:2px solid var(--azul2);outline-offset:2px}
.sidebar-footer{margin-top:auto;padding-top:20px;border-top:1px solid rgba(255,255,255,.06)}
.sf-tag{font-size:10px;color:#4A6585;letter-spacing:.07em;text-transform:uppercase;padding:0 10px}
/* ── TOPBAR ── */
.topbar{display:flex;justify-content:space-between;align-items:center;background:#fff;border-bottom:1px solid var(--linha);padding:0 28px;height:60px;position:sticky;top:0;z-index:5}
.seal{background:#FEF3DA;color:#92550A;font-size:11px;font-weight:700;padding:5px 14px;border-radius:999px;border:1px solid #F5DFA0;letter-spacing:.02em}
.topbar .u{font-size:13px;color:var(--muted)} .topbar .u b{color:var(--ink)}
.sair{color:var(--azul);cursor:pointer;margin-left:10px;font-weight:600}
.sair:hover{text-decoration:underline}
#menu-toggle{display:none;background:none;border:none;padding:8px;margin-left:-8px;color:var(--ink);border-radius:8px}
#menu-toggle:hover{background:var(--bg)}
/* ── CONTENT ── */
.content{padding:28px 32px;max-width:1200px}
h2.page{margin:0 0 4px;font-size:24px;font-weight:800;letter-spacing:-.02em}
.sub{color:var(--muted);font-size:13.5px;margin:0 0 24px;line-height:1.5}
.sub b{color:var(--azul);font-weight:600}
/* ── KPI GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:16px}
.card{background:#fff;border:1px solid var(--linha);border-radius:var(--r);padding:22px;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s}
.kpi{display:flex;align-items:flex-start;gap:16px}
.kpi-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kpi-body{flex:1;min-width:0}
.kpi h3{margin:0 0 8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.kpi .big{font-size:32px;font-weight:800;line-height:1;letter-spacing:-.02em}
.kpi .s{font-size:12px;color:var(--muted);margin-top:8px;font-weight:500}
.kpi.alert .big{color:var(--vermelho)} .kpi.alert .kpi-icon{background:#FEE8E8;color:var(--vermelho)}
.kpi.good .big{color:var(--verde)} .kpi.good .kpi-icon{background:#E7F6EC;color:var(--verde)}
.kpi.warn .big{color:var(--amarelo)} .kpi.warn .kpi-icon{background:var(--yel-s);color:var(--amarelo)}
.kpi.blue .big{color:var(--azul)} .kpi.blue .kpi-icon{background:var(--blue-s);color:var(--azul)}
.kpi.pur .big{color:var(--roxo)} .kpi.pur .kpi-icon{background:var(--pur-s);color:var(--roxo)}
.kpi[data-f]{cursor:pointer} .kpi[data-f]:hover{box-shadow:var(--sh-h);transform:translateY(-1px)}
.kpi[data-f] .s{color:var(--azul);font-weight:600}
/* ── BLOCKS ── */
section.block{background:#fff;border:1px solid var(--linha);border-radius:var(--r);padding:22px;margin-top:18px;box-shadow:var(--sh)}
section.block h3{margin:0 0 16px;font-size:15px;font-weight:700}
section.block h3 small{font-size:11px;color:var(--muted);font-weight:400}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
/* ── BARS ── */
.bars{display:flex;flex-direction:column;gap:6px}
.bar{display:flex;align-items:center;gap:12px;font-size:13px;border-radius:9px;padding:7px 8px;transition:background .15s}
.bar .l{width:150px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .t{flex:1;background:#EDF2FF;border-radius:999px;height:10px;overflow:hidden}
.bar .f{height:100%;background:var(--azul);border-radius:999px}
.bar b{width:36px;text-align:right;font-weight:700;color:var(--ink)}
.bar-click{cursor:pointer} .bar-click:hover{background:#F5F7FB} .bar-click:hover b{color:var(--azul)}
/* ── TABLE ── */
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:11px 12px;font-size:13px;border-bottom:1px solid var(--linha);vertical-align:middle}
th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
tbody tr{transition:background .12s} tbody tr:hover{background:#F7F9FF;cursor:pointer}
/* ── PILLS ── */
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.c-red{background:var(--red-s);color:var(--vermelho)} .c-yel{background:var(--yel-s);color:#92550A} .c-blue{background:var(--blue-s);color:var(--azul)} .c-grn{background:var(--grn-s);color:var(--verde)} .c-gry{background:var(--gry-s);color:var(--muted)}
/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filters input,.filters select{padding:8px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;background:#fff;font-family:inherit;color:var(--ink);transition:border-color .15s;outline:none}
.filters input:focus,.filters select:focus{border-color:var(--azul)}
/* ── BUTTONS ── */
.btn{background:var(--azul);color:#fff;border:0;border-radius:var(--r-xs);padding:9px 16px;font-size:13px;font-weight:600;transition:background .15s}
.btn:hover{background:var(--azul2)} .btn.g{background:var(--blue-s);color:var(--azul)} .btn.g:hover{background:#dce8ff}
.muted{color:var(--muted)} .note{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5}
/* ── DRAWER ── */
#ov{position:fixed;inset:0;background:rgba(11,31,65,.45);display:flex;justify-content:flex-end;z-index:20;backdrop-filter:blur(2px)}
#dr{width:540px;max-width:96vw;background:#fff;height:100%;overflow:auto;padding:28px;box-shadow:-4px 0 32px rgba(11,31,65,.12)}
.kv{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--linha);font-size:13px} .kv span{color:var(--muted)}
.expl{background:#F7F9FE;border:1px solid var(--linha);border-radius:var(--r-sm);padding:14px;font-size:13px;margin:12px 0;line-height:1.5}
.opts{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.opts button{border:1.5px solid var(--linha);background:#fff;border-radius:999px;padding:8px 14px;font-size:12px;font-weight:600;transition:all .15s}
.opts button:hover{border-color:var(--azul);color:var(--azul)} .opts button.on{background:var(--azul);color:#fff;border-color:var(--azul)}
textarea{width:100%;border:1.5px solid var(--linha);border-radius:var(--r-sm);padding:12px;font-family:inherit;font-size:13px;min-height:64px;outline:none;transition:border-color .15s;resize:vertical}
textarea:focus{border-color:var(--azul)}
/* ── MODULE SWITCHER ── */
.mod-switch{display:flex;gap:6px;padding:0 2px 16px;margin-bottom:2px;border-bottom:1px solid rgba(255,255,255,.07)}
.mod-btn{flex:1;background:rgba(255,255,255,.07);border:none;border-radius:8px;padding:8px 6px;color:#8AAED4;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;transition:all .15s;cursor:pointer;line-height:1.2}
.mod-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.mod-btn.on{background:var(--azul);color:#fff;box-shadow:0 2px 10px rgba(36,87,235,.4)}
/* ── MOBILE ── */
.overlay-mob{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:29}
.overlay-mob.open{display:block}
@media(max-width:900px){
  #app{grid-template-columns:1fr}
  aside{position:fixed;left:0;top:0;height:100vh;width:240px;z-index:30;transform:translateX(-100%);transition:transform .25s}
  aside.open{transform:translateX(0)}
  .topbar{padding:0 16px}
  .content{padding:20px 16px}
  #menu-toggle{display:flex;align-items:center}
  .row2{grid-template-columns:1fr}
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr 1fr}
  h2.page{font-size:20px} .kpi .big{font-size:26px}
  .bar .l{width:110px;font-size:12px}
  .content{padding:16px 14px}
}
@media print{aside,#sair,.seal,.topbar,.filters,.btn,.opts,textarea,.note-print{display:none!important} #app{display:block} .content{padding:0} section.block{break-inside:avoid;border:1px solid #ccc;margin-bottom:12px} h2.page{font-size:18px} table{font-size:12px}}
</style>

<body>
<div id="root"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sb = createClient('https://zpweiqjgmtggglfrzixu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpwd2VpcWpnbXRnZ2dsZnJ6aXh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNTcwNTQsImV4cCI6MjA5NzYzMzA1NH0.4H0FP1ZB9VxEZXzxBMuUIAibW3hK5WSu61U60Nnk79M');
const ROOT = document.getElementById('root');

const LABEL = {atraso:'Atraso',saida_ausente:'Saída ausente',entrada_ausente:'Entrada ausente',escala_ativa_sem_marcacao:'Sem marcação',marcacoes_duplicadas:'Batidas duplicadas',marcacoes_abaixo_esperado:'Abaixo do esperado',intervalo_incompleto:'Intervalo incompleto',saida_antecipada:'Saída antecipada',jornada_abaixo:'Jornada abaixo',jornada_acima:'Jornada acima',possivel_hora_extra:'Possível hora extra',possivel_extrapolacao_jornada:'Extrapolação de jornada',marcacao_incompativel_escala:'Incompatível com escala',jornada_atravessa_meia_noite:'Cruza a meia-noite',inconsistencia_feriado_folga:'Batida em folga/feriado',escala_nao_encontrada:'Escala não encontrada'};
const STL = {aberta:'Aberta',aguardando_revisao:'Aguardando',confirmada:'Confirmada',falso_positivo:'Falso positivo',resolvida_na_fonte:'Resolvida na Sólides',dados_insuficientes:'Dados insuficientes',necessita_revisao_regra:'Revisar regra'};
const tl = t => LABEL[t]||t;
const stl = s => STL[s]||s;
const dBR = d => d ? d.split('-').reverse().join('/') : '—';
const sevC = s => (s==='critica'||s==='alta')?'c-red':s==='media'?'c-yel':s==='baixa'?'c-blue':'c-gry';
const stC = s => ({aberta:'c-blue',aguardando_revisao:'c-yel',confirmada:'c-red',falso_positivo:'c-gry',resolvida_na_fonte:'c-grn',dados_insuficientes:'c-gry',necessita_revisao_regra:'c-gry'})[s]||'c-gry';
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let USER=null, ROLE='supervisor_dp', EXC=[], TAB='visao', PRESET=null, MES_VIGENTE='';
const hmmfmt=m=>{if(!m||m===0)return'—';const h=Math.floor(Math.abs(m)/60);const mm=String(Math.abs(m)%60).padStart(2,'0');return`${h}h${mm}`;};
let RELATORIO=null;
let LAST_RUN=null;
// ── Estado do módulo Uniformes ────────────────────────────────
let MODULE='ponto'; // 'ponto' | 'uniformes'
let UTAB='u_visao';
let U_PLANTS=[], U_ITEMS=[], U_SIZES=[], U_STOCK=[], U_DELIVERIES=[], U_ORDERS=[], U_REQUESTS=[], U_AUDIT=[], U_EMPLOYEES=[];
let U_LOADED=false;

async function boot(){
  // Detecta link de recuperação de senha (?type=recovery no hash ou query)
  const hash = Object.fromEntries(new URLSearchParams(location.hash.slice(1)));
  const query = Object.fromEntries(new URLSearchParams(location.search.slice(1)));
  if((hash.type||query.type)==='recovery'){
    // O Supabase já estabelece a sessão via URL — aguarda e mostra form de nova senha
    await new Promise(r=>setTimeout(r,800));
    const { data:{ session } } = await sb.auth.getSession();
    if(session){ USER=session.user; return renderNovaSenha(); }
  }
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ USER=session.user; await afterLogin(); } else renderLogin();
}
function renderNovaSenha(msg){
  ROOT.innerHTML=`<div class="login"><h2>Redefinir senha</h2>
    <p>Digite sua nova senha para acessar o painel.</p>
    <label>Nova senha</label><input id="p1" type="password" placeholder="Mínimo 6 caracteres"/>
    <label>Confirmar senha</label><input id="p2" type="password" placeholder="Repita a senha"/>
    <button id="b">Salvar nova senha</button><div class="erro">${msg||''}</div></div>`;
  document.getElementById('b').onclick=async()=>{
    const p1=document.getElementById('p1').value, p2=document.getElementById('p2').value;
    if(p1.length<6)return renderNovaSenha('Senha muito curta (mínimo 6 caracteres).');
    if(p1!==p2)return renderNovaSenha('As senhas não coincidem.');
    const{error}=await sb.auth.updateUser({password:p1});
    if(error)return renderNovaSenha('Erro: '+error.message);
    history.replaceState(null,'',location.pathname);
    await afterLogin();
  };
}
function renderLogin(msg){
  ROOT.innerHTML = `<div class="login"><h2>Ponto Inteligente DP</h2>
    <p>Painel do Departamento Pessoal — acesso interno</p>
    <label>E-mail</label><input id="e" type="email" placeholder="seu.email@velper.com.br"/>
    <label>Senha</label><input id="s" type="password" placeholder="sua senha"/>
    <button id="b">Entrar</button><div class="erro">${msg||''}</div></div>`;
  const go=async()=>{const{data,error}=await sb.auth.signInWithPassword({email:document.getElementById('e').value.trim(),password:document.getElementById('s').value});
    if(error)return renderLogin('E-mail ou senha incorretos.');USER=data.user;afterLogin();};
  document.getElementById('b').onclick=go;
  document.getElementById('s').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}
async function afterLogin(){
  const r=await sb.from('user_roles').select('role').eq('is_active',true);
  if(r.data&&r.data.length){ ROLE = r.data.some(x=>x.role==='owner')?'owner':r.data[0].role; }
  await Promise.all([loadExceptions(), loadLastRun()]); renderApp();
  setupRealtime();
}
function setupRealtime(){
  sb.channel('robot-runs-done')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'robot_runs'},
      async (payload)=>{
        const s=payload.new&&payload.new.status;
        if(s==='concluida'||s==='concluida_com_erros'){
          await Promise.all([loadExceptions(),loadLastRun()]);
          renderApp();
          showToast('Painel atualizado — robô terminou a varredura');
        }
      })
    .subscribe();
}
function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:20px;right:20px;background:#0f2747;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:opacity .4s';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),400);},4000);
}
async function loadExceptions(){
  // Filtra pelo mês vigente: só exceções do período atual de conferência.
  const hoje=new Date();
  const de=new Date(hoje.getFullYear(),hoje.getMonth(),1).toISOString().slice(0,10);
  const ate=new Date(hoje.getFullYear(),hoje.getMonth()+1,0).toISOString().slice(0,10);
  const anoMes=de.slice(0,7);
  EXC=[]; let from=0; const size=1000;
  for(let i=0;i<10;i++){
    const { data } = await sb.from('timekeeping_exceptions').select('*')
      .neq('status','ignorada_por_regra')
      .gte('analyzed_date',de).lte('analyzed_date',ate)
      .order('analyzed_date',{ascending:false}).range(from,from+size-1);
    if(!data||!data.length)break; EXC.push(...data); if(data.length<size)break; from+=size;
  }
  MES_VIGENTE=anoMes;
}
async function loadLastRun(){
  const {data}=await sb.from('robot_runs').select('employees_active,finished_at')
    .in('status',['concluida','concluida_com_erros']).order('finished_at',{ascending:false}).limit(1);
  LAST_RUN=(data&&data.length)?data[0]:null;
}
function countBy(arr,key){const o={};for(const a of arr)o[a[key]]=(o[a[key]]||0)+1;return o;}
function bars(obj,kind){const e=Object.entries(obj||{}).sort((a,b)=>b[1]-a[1]);const m=Math.max(1,...e.map(x=>x[1]));
  if(!e.length)return'<span class="muted">Sem dados</span>';
  return `<div class="bars">${e.map(([k,v])=>`<div class="bar${kind?' bar-click':''}" ${kind?`data-bk="${kind}" data-bv="${esc(k)}" title="Clique para filtrar"`:''}><div class="l">${esc(tl(k))}</div><div class="t"><div class="f" style="width:${v/m*100}%"></div></div><b>${v}</b></div>`).join('')}</div>`;}

function renderApp(){
  const IC={

    blue:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
    pur:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>',
    warn:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  };
  return `<div class="card kpi ${cc}" ${f?`data-f="${f}" title="Clique para ver a lista"`:''}><div class="kpi-icon">${KI[cc]||KI.blue}</div><div class="kpi-body"><h3>${h}</h3><div class="big">${b}</div><div class="s">${s}</div></div></div>`;

function row(e){return `<tr data-id="${e.id}"><td>${esc(e.display_name)}</td><td>${esc(e.plant)}</td><td>${dBR(e.analyzed_date)}</td><td>${esc(tl(e.exception_type))}</td><td><span class="pill ${stC(e.status)}">${stl(e.status)}</span></td></tr>`;}

function vExc(mode='abertos'){
  const isOpen=mode==='abertos';
  const BASE=EXC.filter(e=>isOpen
    ?['aberta','aguardando_revisao','confirmada'].includes(e.status)
    :['falso_positivo','resolvida_na_fonte'].includes(e.status));
  const titulo=isOpen?'Em aberto':'Corrigidos';
  const subtitulo=isOpen
    ?'Exceções que precisam de tratamento. Abra um colaborador para classificar todos os apontamentos de uma vez.'
    :'Exceções já tratadas. Clique para consultar ou reclassificar se necessário.';
  const stOpts=isOpen
    ?{aberta:'Aberta',aguardando_revisao:'Aguardando',confirmada:'Confirmada'}
    :{falso_positivo:'Falso positivo',resolvida_na_fonte:'Resolvida na Sólides'};
  const V=document.getElementById('view');
  const filiais=[...new Set(BASE.map(e=>e.plant))].sort();
  const empresas=[...new Set(BASE.map(e=>e.company).filter(Boolean))].sort();
  const setores=[...new Set(BASE.map(e=>e.department))].sort();
  const tipos=[...new Set(BASE.map(e=>e.exception_type))].sort();
  const dias=[...new Set(BASE.map(e=>e.analyzed_date))].sort().reverse();
  V.innerHTML=`<h2 class="page">${titulo}</h2><p class="sub">${subtitulo}</p>
    <section class="block">
      <div class="filters">
        <input id="fq" placeholder="Buscar colaborador..."/>
        <select id="fdia"><option value="">Todos os dias</option>${dias.map(d=>`<option value="${d}">${dBR(d)}</option>`).join('')}</select>
        <select id="ffil"><option value="">Todos os locais</option>${filiais.map(p=>`<option>${esc(p)}</option>`).join('')}</select>
        <select id="femp"><option value="">Todas as empresas</option>${empresas.map(p=>`<option>${esc(p)}</option>`).join('')}</select>
        <select id="fset"><option value="">Todos os setores</option>${setores.map(p=>`<option>${esc(p)}</option>`).join('')}</select>
        <select id="ftip"><option value="">Todos os tipos</option>${tipos.map(t=>`<option value="${t}">${esc(tl(t))}</option>`).join('')}</select>
        <select id="fsev"><option value="">Toda gravidade</option><option value="alta">alta</option><option value="media">media</option><option value="baixa">baixa</option></select>
        <select id="fst"><option value="">Todo status</option>${Object.keys(stOpts).map(s=>`<option value="${s}">${stOpts[s]}</option>`).join('')}</select>
        <button class="btn g" id="csv">Exportar CSV</button>
      </div>
      <table><thead><tr><th>Colaborador</th><th>Local de trabalho</th><th>Empresa</th><th>Setor</th><th>Apontamentos</th><th>${isOpen?'A tratar':'Corrigidos'}</th><th>Pior gravidade</th></tr></thead>
      <tbody id="tb"></tbody></table><p class="note" id="cnt"></p>
    </section>`;
  const sevRank={critica:4,alta:3,media:2,baixa:1,informativa:0};
  const filtered=()=>{const q=val('fq').toLowerCase(),dy=val('fdia'),fl=val('ffil'),em=val('femp'),se=val('fset'),ti=val('ftip'),sv=val('fsev'),st=val('fst');
    return BASE.filter(e=>(!q||(e.display_name||'').toLowerCase().includes(q))&&(!dy||e.analyzed_date===dy)&&(!fl||e.plant===fl)&&(!em||e.company===em)&&(!se||e.department===se)&&(!ti||e.exception_type===ti)&&(!sv||e.severity===sv)&&(!st||e.status===st));};
  const draw=()=>{
    const rows=filtered(); const byEmp=new Map();
    for(const e of rows){const k=e.solides_internal_id;if(!byEmp.has(k))byEmp.set(k,{name:e.display_name,plant:e.plant,company:e.company||null,dep:e.department,items:[]});byEmp.get(k).items.push(e);}
    const groups=[...byEmp.entries()].sort((a,b)=>b[1].items.length-a[1].items.length);
    document.getElementById('tb').innerHTML=groups.slice(0,400).map(([id,g])=>{
      const cnt=isOpen
        ?g.items.filter(x=>['aberta','aguardando_revisao','confirmada'].includes(x.status)).length
        :g.items.filter(x=>['falso_positivo','resolvida_na_fonte'].includes(x.status)).length;
      const wr=g.items.reduce((m,x)=>Math.max(m,sevRank[x.severity]||0),0);
      const ws=['informativa','baixa','media','alta','critica'][wr]||'baixa';
      return `<tr data-emp="${esc(id)}"><td>${esc(g.name)}</td><td>${esc(g.plant)}</td><td>${g.company?`<span style="font-size:11px">${esc(g.company)}</span>`:'<span class="muted">—</span>'}</td><td>${esc(g.dep)}</td><td><b>${g.items.length}</b></td><td>${cnt}</td><td><span class="pill ${sevC(ws)}">${ws}</span></td></tr>`;
    }).join('');
    document.getElementById('cnt').textContent=`${groups.length} colaboradores · ${rows.length} apontamentos`;
    document.querySelectorAll('#tb tr[data-emp]').forEach(tr=>tr.onclick=()=>openColaborador(tr.dataset.emp));
    window.__rows=rows;
  };
  ['fq','fdia','ffil','femp','fset','ftip','fsev','fst'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
  document.getElementById('csv').onclick=()=>{const h=['data','colaborador','local_trabalho','empresa','setor','tipo','gravidade','status','explicacao'];
    const ls=[h.join(';')].concat((window.__rows||BASE).map(e=>[e.analyzed_date,e.display_name,e.plant,e.company||'',e.department,e.exception_type,e.severity,e.status,'"'+(e.explanation||'').replace(/"/g,'""')+'"'].join(';')));
    const b=new Blob([ls.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`excecoes-${mode}.csv`;a.click();};
  if(PRESET){
    if(typeof PRESET==='object'){
      if(PRESET.fil) document.getElementById('ffil').value=PRESET.fil;
      if(PRESET.tip) document.getElementById('ftip').value=PRESET.tip;
      if(PRESET.sev) document.getElementById('fsev').value=PRESET.sev;
      if(PRESET.st)  document.getElementById('fst').value=PRESET.st;
    } else {
      if(PRESET==='confirmada') document.getElementById('fst').value='confirmada';
      else if(PRESET==='falso_positivo') document.getElementById('fst').value='falso_positivo';
      else if(PRESET==='resolvida_na_fonte') document.getElementById('fst').value='resolvida_na_fonte';
    }
    PRESET=null;
  }
  draw();
}
function val(id){const e=document.getElementById(id);return e?e.value:'';}

function openDrawer(id){
  const e=EXC.find(x=>String(x.id)===String(id));if(!e)return;
  const opts=[['confirmada','Pendência confirmada'],['falso_positivo','Falso positivo'],['resolvida_na_fonte','Resolvida na Sólides'],['dados_insuficientes','Dados insuficientes'],['aguardando_revisao','Aguardando análise']];
  document.body.insertAdjacentHTML('beforeend',`<div id="ov"><div id="dr">
    <div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">${esc(e.display_name)}</h3><button class="btn g" id="fx">Fechar</button></div>
    <p class="muted">${esc(e.plant)} · ${esc(e.department)} · ${esc(e.schedule_name)}</p>
    ${e.company?`<p class="muted" style="margin-top:-8px;font-size:12px">Empresa: ${esc(e.company)}</p>`:''}
    <div class="kv"><span>Dia</span><b>${dBR(e.analyzed_date)}</b></div>

    <div class="kv"><span>Status</span><span class="pill ${stC(e.status)}">${stl(e.status)}</span></div>
    <div class="kv"><span>Escala prevista</span><b>${esc(e.schedule_preview)}</b></div>
    <div class="kv"><span>Batidas registradas</span><b>${esc(e.punches_preview)}</b></div>
    <div class="expl"><b>Explicação:</b><br>${esc(e.explanation)}</div>
    <p class="muted" style="margin-bottom:4px"><b>Classificar:</b></p>
    <div class="opts" id="op">${opts.map(o=>`<button data-k="${o[0]}" class="${e.status===o[0]?'on':''}">${o[1]}</button>`).join('')}</div>
    <textarea id="obs" placeholder="Observação (opcional)">${esc(e.operational_note)}</textarea>
    <div style="margin-top:12px"><button class="btn" id="save">Salvar classificação</button></div>
  </div></div>`);
  const ov=document.getElementById('ov');
  ov.onclick=ev=>{if(ev.target.id==='ov')ov.remove();};
  document.getElementById('fx').onclick=()=>ov.remove();
  document.querySelectorAll('#op button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#op button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
  document.getElementById('save').onclick=async()=>{
    const sel=document.querySelector('#op button.on');if(!sel){alert('Escolha uma classificação.');return;}
    const novo=sel.dataset.k, obs=document.getElementById('obs').value||null;
    await sb.from('timekeeping_exceptions').update({status:novo,validated_by:USER.id,validated_at:new Date().toISOString(),operational_note:obs}).eq('id',e.id);
    await sb.from('exception_status_history').insert({exception_id:e.id,old_status:e.status,new_status:novo,note:obs,changed_by:USER.id});
    e.status=novo; e.operational_note=obs; ov.remove(); renderApp();
  };
}

function openColaborador(empId){
  const dy=val('fdia');
  const items=EXC.filter(e=>String(e.solides_internal_id)===String(empId)&&(!dy||e.analyzed_date===dy)).sort((a,b)=>(b.analyzed_date||'').localeCompare(a.analyzed_date||''));
  if(!items.length)return; const g=items[0];

async function fech(){
  const V=document.getElementById('view');
  const mesLabel=MES_VIGENTE?new Date(MES_VIGENTE+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'}):'';
  V.innerHTML=`<h2 class="page">Fechamento mensal <small style="font-size:13px;font-weight:400;color:#666;margin-left:8px">${mesLabel}</small></h2>
    <p class="sub">Relatório gerencial da competência.</p>
    <section class="block"><p class="muted" style="text-align:center;padding:20px">Carregando dados...</p></section>`;

  const hoje=new Date();
  const de=new Date(hoje.getFullYear(),hoje.getMonth(),1).toISOString().slice(0,10);
  const ate=new Date(hoje.getFullYear(),hoje.getMonth()+1,0).toISOString().slice(0,10);

  const TIPOS_HE=['jornada_acima','possivel_hora_extra','possivel_extrapolacao_jornada'];
  const TIPOS_JB=['jornada_abaixo'];

  let MGMT=[]; let from=0;
  for(let i=0;i<10;i++){
    const {data}=await sb.from('timekeeping_exceptions')
      .select('solides_internal_id,display_name,plant,company,exception_type,evidence_minutes,analyzed_date,operational_note')
      .eq('status','ignorada_por_regra')
      .in('exception_type',[...TIPOS_HE,...TIPOS_JB])
      .gte('analyzed_date',de).lte('analyzed_date',ate)
      .range(from,from+999);
    if(!data||!data.length)break; MGMT.push(...data); if(data.length<1000)break; from+=1000;
  }

  const aggr=(tipos)=>{const map=new Map();
    for(const e of MGMT){if(!tipos.includes(e.exception_type))continue;
      const k=e.solides_internal_id;
      if(!map.has(k))map.set(k,{sid:k,name:e.display_name,plant:e.plant,company:e.company||null,dias:new Set(),min:0});
      const a=map.get(k);a.dias.add(e.analyzed_date);a.min+=(e.evidence_minutes||0);
    }
    return[...map.values()].map(r=>({...r,dias:r.dias.size})).sort((a,b)=>b.min-a.min);
  };

  const heRows=aggr(TIPOS_HE);
  const jbRows=aggr(TIPOS_JB);

  // HE sem justificativa = colaboradores com hora extra E com erros reais ainda abertos na fila da Andreia
  const empComErroAberto=new Set(EXC.filter(e=>['aberta','confirmada'].includes(e.status)).map(e=>String(e.solides_internal_id)));
  const sjRows=heRows.filter(r=>empComErroAberto.has(String(r.sid)));
  RELATORIO={heRows,jbRows,sjRows,mesLabel,mes:MES_VIGENTE};

  const {data:_st}=await sb.rpc('get_mes_status',{p_competencia:MES_VIGENTE});
  const stRow=_st&&_st[0]; const isFechado=!!stRow;
  const closedAt=isFechado?new Date(stRow.closed_at).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'}):'';
  const closedBy=isFechado?stRow.closed_by:'';

  const mkTbl=(rows,cols,rowFn)=>`<div style="overflow-x:auto"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${rows.length?rows.map(rowFn).join(''):`<tr><td colspan="${cols.length}" style="text-align:center;padding:20px" class="muted">Nenhum registro este mês</td></tr>`}</tbody></table></div>`;

  const badge=(n,c)=>`<span class="pill ${c}" style="font-size:12px;margin-left:8px">${n} colaborador${n!==1?'es':''}</span>`;

  V.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">
      <h2 class="page" style="margin:0">Fechamento mensal <small style="font-size:13px;font-weight:400;color:#666;margin-left:8px">${mesLabel}</small></h2>
      <div style="display:flex;gap:8px">
        <button class="btn" id="btn-pdf">⬇ PDF</button>
        <button class="btn g" id="btn-xls">⬇ Excel</button>
      </div>
    </div>
    <p class="sub">Relatório gerencial · não inclui correções de ponto pendentes (ver aba Exceções).</p>

    <section class="block">
      <h3>Horas extras ${badge(heRows.length,'c-yel')}</h3>
      <p class="note">Colaboradores que excederam a jornada contratada em pelo menos um dia. O sistema de ponto calcula normalmente — exibido aqui para ciência gerencial.</p>
      ${mkTbl(heRows,['Colaborador','Local de trabalho','Empresa','Dias c/ HE','Total estimado'],
        r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.plant)}</td><td style="font-size:11px">${esc(r.company||'—')}</td><td>${r.dias}</td><td><b>${hmmfmt(r.min)}</b></td></tr>`)}
    </section>

    <section class="block">
      <h3>Abaixo da carga horária ${badge(jbRows.length,'c-red')}</h3>
      <p class="note">Colaboradores com jornada inferior ao contratado em algum dia. O ponto calcula com o que foi registrado.</p>
      ${mkTbl(jbRows,['Colaborador','Local de trabalho','Empresa','Dias','Déficit estimado'],
        r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.plant)}</td><td style="font-size:11px">${esc(r.company||'—')}</td><td>${r.dias}</td><td><b>${hmmfmt(r.min)}</b></td></tr>`)}
    </section>

    <section class="block">
      <h3>Horas extras sem justificativa ${badge(sjRows.length,'c-red')}</h3>
      <p class="note">Colaboradores com horas extras <b>e</b> erros de batida em aberto na fila do DP. A hora extra pode ser consequência de marcação irregular (ex.: esqueceu de bater a saída). Requer análise antes do fechamento.</p>
      ${mkTbl(sjRows,['Colaborador','Local de trabalho','Empresa','Dias c/ HE','Total estimado'],
        r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.plant)}</td><td style="font-size:11px">${esc(r.company||'—')}</td><td>${r.dias}</td><td><b>${hmmfmt(r.min)}</b></td></tr>`)}
    </section>

    <section class="block" style="border:2px solid ${isFechado?'var(--verde)':'var(--linha)'}">
      <h3 style="color:${isFechado?'var(--verde)':'var(--ink)'}">${isFechado?'✓ Competência fechada':'Fechar competência'}</h3>
      ${isFechado
        ?`<p style="margin:0">Fechado em <b>${closedAt}</b> por <b>${closedBy}</b>. Snapshot salvo para a contabilidade.</p>`
        :`<p class="note">Todos os erros de ponto devem estar tratados antes de fechar. O fechamento registra um snapshot permanente e não pode ser desfeito.</p>
          <div style="margin-top:14px"><button class="btn" id="btn-fechar" style="background:var(--verde);font-size:14px;padding:10px 20px">Fechar ${mesLabel}</button></div>`
      }
    </section>`;
  document.getElementById('btn-pdf').onclick=gerarPDF;
  document.getElementById('btn-xls').onclick=gerarExcel;
  if(!isFechado) document.getElementById('btn-fechar').onclick=fecharMes;
}

async function fecharMes(){
  if(!MES_VIGENTE)return;
  const mesLabel=new Date(MES_VIGENTE+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const abertas=EXC.filter(e=>['aberta','aguardando_revisao','confirmada'].includes(e.status)).length;
  const msg=abertas>0
    ?`Atenção: ainda há ${abertas} exceção(ões) em aberto.\n\nDeseja fechar mesmo assim?`
    :`Fechar a competência ${mesLabel}?\n\nEssa ação cria um snapshot permanente para a contabilidade e não pode ser desfeita.`;
  if(!confirm(msg))return;
  try{
    const {error}=await sb.rpc('fechar_mes',{
      p_competencia:MES_VIGENTE,
      p_reviewer_id:USER.id,
      p_reviewer_name:USER.email,
      p_note:'Fechado pelo portal DP em '+new Date().toISOString()
    });
    if(error)throw error;
    alert('Competência '+mesLabel+' fechada com sucesso!');
    fech();
  }catch(err){
    alert('Erro ao fechar: '+err.message);
  }
}

function gerarExcel(){
  if(!RELATORIO)return;
  const {heRows,jbRows,sjRows,mes}=RELATORIO;
  const XL=window.XLSX;
  const wb=XL.utils.book_new();
  const mkWs=(rows,cols,fn)=>XL.utils.aoa_to_sheet([cols,...rows.map(fn)]);
  XL.utils.book_append_sheet(wb,mkWs(heRows,['Colaborador','Local de trabalho','Empresa','Dias c/ HE','Total estimado'],

  XL.utils.book_append_sheet(wb,mkWs(jbRows,['Colaborador','Local de trabalho','Empresa','Dias','Deficit estimado'],
    r=>[r.name,r.plant,r.company||'—',r.dias,hmmfmt(r.min)]),'Abaixo da Carga');
  XL.utils.book_append_sheet(wb,mkWs(sjRows,['Colaborador','Local de trabalho','Empresa','Dias c/ HE','Total estimado'],
    r=>[r.name,r.plant,r.company||'—',r.dias,hmmfmt(r.min)]),'HE sem Justificativa');
  XL.writeFile(wb,'relatorio-gerencial-'+(mes||'competencia')+'.xlsx');
}

  if(avail===0)return{l:'Sem estoque',c:'c-red'};

      return`<tr><td style="padding:10px 12px;font-weight:600;white-space:nowrap">${esc(item.name)}</td>${cells}</tr>`;
    }).join('');
    return`<div style="overflow-x:auto"><table style="border-collapse:separate;border-spacing:0">
      <thead><tr><th style="padding:10px 12px;text-align:left;min-width:120px">Item</th>${szCols}</tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  };

  const refreshGrid=()=>{
    const pid=val('ug-plant'),mode=val('ug-mode');
    document.getElementById('ug-grid').innerHTML=pid?buildGrid(pid,mode):`<p class="muted" style="text-align:center;padding:20px">Selecione uma planta para ver a grade.</p>`;
    document.querySelectorAll('.grd-inp').forEach(inp=>{
      inp.onfocus=()=>inp.style.borderColor='var(--azul)';
      inp.onblur=()=>inp.style.borderColor='var(--linha)';
    });
  };

  /* ── tabela de saldo ── */
  const renderTable=()=>{
    const fp=val('ufp'),fst=val('ufst');
    const rows=U_STOCK.filter(s=>!fp||s.plant_id===fp).map(s=>{
      const st=uStockSt(s.qty_available,s.qty_minimum);
      if(fst&&fst!==st.l)return null;
      return`<tr><td>${uPlant(s.plant_id)}</td><td>${uItem(s.item_id)}</td><td><b>${uSize(s.size_id)}</b></td>
        <td><b style="font-size:16px;color:${s.qty_available===0?'var(--vermelho)':s.qty_available<=s.qty_minimum?'var(--amarelo)':'var(--ink)'}">${s.qty_available}</b></td>
        <td style="color:var(--muted)">${s.qty_minimum}</td>
        <td><span class="pill ${st.c}">${st.l}</span></td>
        <td style="font-size:12px;color:var(--muted)">${s.last_movement_at?uDate(s.last_movement_at.slice(0,10)):'—'}</td></tr>`;
    }).filter(Boolean);
    document.getElementById('utb').innerHTML=rows.length?rows.join(''):`<tr><td colspan="7" style="text-align:center;padding:24px" class="muted">Sem saldo cadastrado. Use o lançamento acima para inserir o estoque atual.</td></tr>`;
    document.getElementById('ucnt').textContent=`${rows.length} linha(s)`;
  };

  V.innerHTML=`<h2 class="page">Estoque</h2>
    <p class="sub">Lance o estoque atual e acompanhe cada movimentação. Entradas, saídas e ajustes ficam todos registrados.</p>

    <section class="block">
      <h3>Lançar / Ajustar estoque</h3>
      <p class="note" style="margin-bottom:14px">
        Use <b>Definir</b> para informar a quantidade exata que existe agora (lançamento inicial ou conferência).
        Use <b>Adicionar</b> para somar ao saldo (ex.: chegou mais mercadoria sem NF formal).
      </p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px">
        <div>
          <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px">Planta</label>
          <select id="ug-plant" style="padding:10px 14px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit;min-width:160px;outline:none">
            <option value="">Selecione…</option>${plantOpts}
          </select>
        </div>
        <div>
          <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px">Modo</label>
          <select id="ug-mode" style="padding:10px 14px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit;outline:none">
            <option value="definir">Definir quantidade (substituir)</option>
            <option value="adicionar">Adicionar ao saldo atual</option>
          </select>
        </div>
        <div style="flex:1;min-width:200px">
          <label style="display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px">Observação</label>
          <input id="ug-obs" placeholder="Ex: Lançamento inicial jun/2026, Recebimento avulso…" style="width:100%;padding:10px 14px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit;outline:none"/>
        </div>
      </div>
      <div id="ug-grid" style="margin-bottom:16px"><p class="muted" style="text-align:center;padding:20px">Selecione uma planta para ver a grade.</p></div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn" id="ug-save">Salvar estoque</button>
        <span id="ug-msg" style="font-size:13px;color:var(--muted)"></span>
      </div>
    </section>

    <section class="block" style="margin-top:18px">
      <h3>Saldo atual</h3>
      <div class="filters" style="margin-bottom:12px">
        <select id="ufp"><option value="">Todas as plantas</option>${plantOpts}</select>
        <select id="ufst"><option value="">Toda situação</option>
          <option>Regular</option><option>Atenção</option><option>Reposição necessária</option><option>Sem estoque</option>
        </select>
      </div>
      <table><thead><tr><th>Planta</th><th>Item</th><th>Tamanho</th><th>Disponível</th><th>Mínimo</th><th>Situação</th><th>Última mov.</th></tr></thead>
      <tbody id="utb"></tbody></table>
      <p class="note" id="ucnt"></p>
    </section>`;

  document.getElementById('ug-plant').onchange=refreshGrid;
  document.getElementById('ug-mode').onchange=refreshGrid;
  document.getElementById('ug-plant').onfocus=e=>e.target.style.borderColor='var(--azul)';
  document.getElementById('ug-plant').onblur=e=>e.target.style.borderColor='var(--linha)';
  document.getElementById('ug-obs').onfocus=e=>e.target.style.borderColor='var(--azul)';
  document.getElementById('ug-obs').onblur=e=>e.target.style.borderColor='var(--linha)';
  ['ufp','ufst'].forEach(id=>document.getElementById(id).addEventListener('change',renderTable));

  document.getElementById('ug-save').onclick=async()=>{
    const msg=document.getElementById('ug-msg');
    const pid=val('ug-plant'),mode=val('ug-mode'),obs=val('ug-obs').trim();
    if(!pid){msg.style.color='var(--vermelho)';msg.textContent='Selecione a planta.';return;}
    const items=[];
    document.querySelectorAll('.grd-inp').forEach(inp=>{
      const q=parseInt(inp.value);
      if(!isNaN(q)&&q>=0)items.push({item_id:inp.dataset.it,size_id:inp.dataset.sz,qty:q,mode});
    });
    if(!items.length){msg.style.color='var(--vermelho)';msg.textContent='Nenhum item na grade.';return;}
    msg.style.color='var(--muted)';msg.textContent='Salvando…';
    const{error}=await sb.rpc('ajustar_estoque_avulso',{
      p_plant_id:pid,p_items:items,
      p_obs:obs||(mode==='definir'?'Lançamento de estoque':'Adição avulsa de estoque'),
      p_user_id:USER.id
    });
    if(error){msg.style.color='var(--vermelho)';msg.textContent='Erro: '+error.message;return;}
    await loadUniData();
    msg.style.color='var(--verde)';msg.textContent='Salvo com sucesso!';
    refreshGrid();renderTable();
    showToast('Estoque atualizado com sucesso.');
    setTimeout(()=>msg.textContent='',3000);
  };

  renderTable();
}

// ── ENTREGAS ──────────────────────────────────────────────────
function uEntregas(){
  const V=document.getElementById('view');
  const plantOpts=U_PLANTS.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');

  /* ── grade de itens ── */
  const buildDelivGrid=(plantId)=>{
    if(!plantId)return'';
    const szCols=U_SIZES.map(s=>`<th style="text-align:center;min-width:80px">${esc(s.code)}</th>`).join('');
    const rows=U_ITEMS.map(item=>{
      const cells=U_SIZES.map(sz=>{
        const stk=U_STOCK.find(x=>x.plant_id===plantId&&x.item_id===item.id&&x.size_id===sz.id);
        const avail=stk?stk.qty_available:0;
        const bg=avail===0?'#f9f9f9':avail<=2?'#fffbee':'#fff';
        const color=avail===0?'var(--muted)':avail<=2?'var(--amarelo)':'var(--verde)';
        return`<td style="padding:4px;text-align:center">
          <div style="font-size:10px;font-weight:700;color:${color};margin-bottom:2px">${avail} disp.</div>
          <input type="number" min="0" max="${avail}" value="0" ${avail===0?'disabled':''}
            class="delv-inp" data-it="${item.id}" data-sz="${sz.id}" data-avail="${avail}"
            style="width:60px;text-align:center;padding:6px 2px;border:1.5px solid var(--linha);border-radius:6px;font-size:14px;font-weight:600;background:${bg};font-family:inherit;outline:none;${avail===0?'opacity:.35;cursor:not-allowed':''}"/>
        </td>`;
      }).join('');
      return`<tr><td style="padding:10px 12px;font-weight:600;white-space:nowrap;border-right:1px solid var(--linha)">${esc(item.name)}</td>${cells}</tr>`;
    }).join('');
    return`<div style="overflow-x:auto"><table style="border-collapse:separate;border-spacing:0">
      <thead><tr><th style="padding:10px 12px;text-align:left;min-width:120px;border-right:1px solid var(--linha)">Item</th>${szCols}</tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  };

  const refreshDelivGrid=()=>{
    const pid=val('udp');
    document.getElementById('ud-grid').innerHTML=pid
      ?buildDelivGrid(pid)
      :`<p class="muted" style="text-align:center;padding:20px">Selecione a planta para ver os itens disponíveis.</p>`;
    updateDelivSummary();
    document.querySelectorAll('.delv-inp').forEach(inp=>{
      inp.oninput=()=>{
        const avail=parseInt(inp.dataset.avail)||0;
        let q=parseInt(inp.value)||0;
        if(q>avail){inp.value=avail;q=avail;}
        if(q<0){inp.value=0;q=0;}
        inp.style.borderColor=q>0?'var(--azul)':'var(--linha)';
        updateDelivSummary();
      };
      if(!inp.disabled){
        inp.onfocus=()=>inp.style.borderColor='var(--azul)';
        inp.onblur=()=>{if(!(parseInt(inp.value)>0))inp.style.borderColor='var(--linha)';};
      }
    });
  };

  const updateDelivSummary=()=>{
    const items=getDelivItems();
    const total=items.reduce((s,i)=>s+i.qty,0);
    const el=document.getElementById('ud-summary');if(!el)return;
    if(!items.length){el.innerHTML='<span class="muted">Nenhum item selecionado ainda.</span>';return;}
    el.innerHTML=items.map(i=>`<span class="pill c-blue" style="margin:2px 4px 2px 0">${uItem(i.item_id)} ${uSize(i.size_id)} × ${i.qty}</span>`).join('')
      +`<span style="margin-left:8px;font-size:12px;color:var(--muted)">(${total} peça${total!==1?'s':''})</span>`;
  };

  const getDelivItems=()=>{
    const items=[];
    document.querySelectorAll('.delv-inp').forEach(inp=>{
      const q=parseInt(inp.value)||0;
      if(q>0)items.push({item_id:inp.dataset.it,size_id:inp.dataset.sz,qty:q});
    });
    return items;
  };

  // Tabela histórico
  const hiRows=U_DELIVERIES.slice(0,100).map(d=>{
    const its=d.unif_delivery_items||[];
    const resumo=its.map(i=>`${uItem(i.item_id)} ${uSize(i.size_id)}×${i.qty}`).join(', ');
    return`<tr data-del="${d.id}" style="cursor:pointer">
      <td><b style="color:var(--azul)">${esc(d.protocol)}</b></td><td>${esc(d.employee_name)}</td><td>${uPlant(d.plant_id)}</td>
      <td style="font-size:12px">${resumo||'—'}</td>
      <td>${uDate(d.delivered_at?d.delivered_at.slice(0,10):'')}</td>
      <td>${U_REASON_LABELS[d.reason]||d.reason}</td>
      <td><span class="pill ${d.status==='ativa'?'c-grn':'c-gry'}">${d.status==='ativa'?'Ativa':'Cancelada'}</span></td>
    </tr>`;
  }).join('');

  const inpSt='width:100%;padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s';
  const lbSt='display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px';

  V.innerHTML=`<h2 class="page">Entregas de Uniforme</h2>
    <p class="sub">Busque o colaborador pelo nome — planta e setor são preenchidos automaticamente. Informe as peças e confirme.</p>

    <section class="block">
      <h3>Nova entrega</h3>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px">

        <div style="position:relative">
          <label style="${lbSt}">Colaborador <span style="color:var(--vermelho)">*</span></label>
          <input id="udname" autocomplete="off" placeholder="Digite o nome para buscar…" style="${inpSt}"/>
          <div id="ud-ac" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--azul);border-top:none;border-radius:0 0 var(--r-xs) var(--r-xs);max-height:220px;overflow-y:auto;z-index:200;box-shadow:var(--sh)"></div>
        </div>

        <div>
          <label style="${lbSt}">Planta <span style="color:var(--vermelho)">*</span></label>
          <select id="udp" style="${inpSt}"><option value="">Selecione…</option>${plantOpts}</select>
        </div>

        <div>
          <label style="${lbSt}">Setor</label>
          <input id="uddept" placeholder="Departamento" style="${inpSt}"/>
        </div>

      </div>

      <div style="margin-bottom:16px">
        <label style="${lbSt}">Motivo <span style="color:var(--vermelho)">*</span></label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px" id="ud-reasons">
          ${Object.entries(U_REASON_LABELS).map(([k,v])=>`<button type="button" class="reason-pill" data-r="${k}"
            style="padding:8px 14px;border-radius:20px;border:1.5px solid var(--linha);background:#fff;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s;font-weight:500;color:var(--ink)">${v}</button>`).join('')}
        </div>
        <input type="hidden" id="udreason" value=""/>
      </div>

      <div style="margin-bottom:20px">
        <label style="${lbSt}">Observações</label>
        <input id="udobs" placeholder="Opcional" style="${inpSt}"/>
      </div>

      <div style="margin-bottom:6px">
        <label style="${lbSt}">Itens a entregar</label>
        <p class="note" style="margin-bottom:10px">Preencha a quantidade desejada. Campos acinzentados = sem estoque na planta selecionada.</p>
      </div>
      <div id="ud-grid"><p class="muted" style="text-align:center;padding:20px">Selecione a planta para ver os itens disponíveis.</p></div>

      <div id="ud-summary" style="margin:14px 0 4px;min-height:28px"><span class="muted">Nenhum item selecionado ainda.</span></div>

      <div style="display:flex;gap:10px;align-items:center;margin-top:14px">
        <button class="btn" id="ud-save">Confirmar entrega</button>
        <span id="ud-msg" style="font-size:13px;color:var(--muted)"></span>
      </div>
    </section>

    <section class="block" style="margin-top:18px">
      <h3>Histórico de entregas</h3>
      <table><thead><tr><th>Protocolo</th><th>Colaborador</th><th>Planta</th><th>Itens</th><th>Data</th><th>Motivo</th><th>Status</th></tr></thead>
      <tbody>${hiRows||'<tr><td colspan="7" class="muted" style="text-align:center;padding:20px">Nenhuma entrega registrada.</td></tr>'}</tbody></table>
    </section>`;

  // Focus genérico
  V.querySelectorAll('input,select').forEach(el=>{
    el.onfocus=()=>el.style.borderColor='var(--azul)';
    el.onblur=()=>el.style.borderColor='var(--linha)';
  });

  // ── Autocomplete colaborador ──
  const nameInp=document.getElementById('udname');
  const acBox=document.getElementById('ud-ac');

  const closeAc=()=>{acBox.style.display='none';acBox.innerHTML='';};

  const selectEmp=(emp)=>{
    nameInp.value=emp.display_name;
    nameInp.style.borderColor='var(--verde)';
    closeAc();
    // Auto-preenche planta
    const plant=U_PLANTS.find(p=>p.name===emp.plant||p.code===emp.plant);
    if(plant){
      document.getElementById('udp').value=plant.id;
      refreshDelivGrid();
    }
    // Auto-preenche setor
    if(emp.department){
      document.getElementById('uddept').value=emp.department;
      document.getElementById('uddept').style.borderColor='var(--verde)';
    }
  };

  nameInp.oninput=()=>{
    const q=(nameInp.value||'').trim().toLowerCase();
    if(q.length<2){closeAc();return;}
    const hits=U_EMPLOYEES.filter(e=>e.display_name.toLowerCase().includes(q)).slice(0,12);
    if(!hits.length){closeAc();return;}
    acBox.innerHTML=hits.map(e=>`
      <div class="ac-item" data-sid="${e.solides_internal_id}"
        style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--linha);transition:background .1s">
        <div style="font-weight:600;font-size:13px">${esc(e.display_name)}</div>
        <div style="font-size:11px;color:var(--muted)">${esc(e.plant||'')}${e.department?' · '+esc(e.department):''}</div>
      </div>`).join('');
    acBox.style.display='block';
    acBox.querySelectorAll('.ac-item').forEach(item=>{
      item.onmouseenter=()=>item.style.background='var(--azul-leve)';
      item.onmouseleave=()=>item.style.background='';
      item.onmousedown=(ev)=>{
        ev.preventDefault();
        const emp=U_EMPLOYEES.find(e=>e.solides_internal_id===item.dataset.sid);
        if(emp)selectEmp(emp);
      };
    });
  };

  nameInp.onblur=()=>setTimeout(closeAc,150);

  // Planta manual também atualiza grade
  document.getElementById('udp').onchange=refreshDelivGrid;

  // Reason pills
  document.getElementById('ud-reasons').querySelectorAll('.reason-pill').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.reason-pill').forEach(b=>{b.style.background='#fff';b.style.borderColor='var(--linha)';b.style.color='var(--ink)';b.style.fontWeight='500';});
      btn.style.background='var(--azul)';btn.style.borderColor='var(--azul)';btn.style.color='#fff';btn.style.fontWeight='700';
      document.getElementById('udreason').value=btn.dataset.r;
    };
  });

  // Salvar
  document.getElementById('ud-save').onclick=async()=>{
    const msg=document.getElementById('ud-msg');
    const plant=val('udp'),name=val('udname').trim(),dept=val('uddept').trim(),reason=val('udreason');
    if(!name){msg.style.color='var(--vermelho)';msg.textContent='Informe o colaborador.';return;}
    if(!plant){msg.style.color='var(--vermelho)';msg.textContent='Selecione a planta.';return;}
    if(!reason){msg.style.color='var(--vermelho)';msg.textContent='Selecione o motivo.';return;}
    const items=getDelivItems();
    if(!items.length){msg.style.color='var(--vermelho)';msg.textContent='Informe ao menos uma peça na grade acima.';return;}
    const overstock=items.filter(i=>{
      const avail=parseInt(document.querySelector(`.delv-inp[data-it="${i.item_id}"][data-sz="${i.size_id}"]`)?.dataset.avail||'0');
      return i.qty>avail;
    });
    if(overstock.length){msg.style.color='var(--vermelho)';msg.textContent='Quantidade excede o estoque disponível.';return;}
    msg.style.color='var(--muted)';msg.textContent='Registrando…';
    const{data,error}=await sb.rpc('registrar_entrega',{
      p_plant_id:plant,p_employee_id:null,p_employee_name:name,p_employee_dept:dept||null,
      p_reason:reason,p_responsible:'DP',p_obs:val('udobs')||null,
      p_items:items,p_user_id:USER.id
    });
    if(error){msg.style.color='var(--vermelho)';msg.textContent='Erro: '+error.message;return;}
    await loadUniData();
    showToast(`Entrega registrada — Protocolo ${data.protocol}`);
    UTAB='u_entregas';renderApp();
  };

  V.querySelectorAll('tr[data-del]').forEach(tr=>tr.onclick=()=>openDeliveryDrawer(tr.dataset.del));
}

function openDeliveryDrawer(id){
  const d=U_DELIVERIES.find(x=>x.id===id);if(!d)return;
  const its=(d.unif_delivery_items||[]).map(i=>`<div class="kv"><span>${uItem(i.item_id)} ${uSize(i.size_id)}</span><b>${i.qty} un</b></div>`).join('');
  document.body.insertAdjacentHTML('beforeend',`<div id="ov"><div id="dr">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="margin:0">Entrega ${esc(d.protocol)}</h3><button class="btn g" id="fx">Fechar</button></div>
    <div class="kv"><span>Colaborador</span><b>${esc(d.employee_name)}</b></div>
    <div class="kv"><span>Planta</span><b>${uPlant(d.plant_id)}</b></div>
    <div class="kv"><span>Setor</span><b>${d.employee_dept||'—'}</b></div>
    <div class="kv"><span>Data</span><b>${uDate(d.delivered_at?d.delivered_at.slice(0,10):'')}</b></div>
    <div class="kv"><span>Motivo</span><b>${U_REASON_LABELS[d.reason]||d.reason}</b></div>
    <div class="kv"><span>Responsável</span><b>${esc(d.responsible)}</b></div>
    <div class="kv"><span>Status</span><span class="pill ${d.status==='ativa'?'c-grn':'c-gry'}">${d.status==='ativa'?'Ativa':'Cancelada'}</span></div>
    <div style="margin-top:12px"><b>Itens:</b>${its}</div>
    ${d.status==='ativa'?`<div style="margin-top:20px;border-top:1px solid var(--linha);padding-top:16px">
      <b style="font-size:13px">Cancelar entrega</b>
      <textarea id="cr" placeholder="Motivo do cancelamento (obrigatório)" style="margin-top:8px"></textarea>
      <button class="btn" style="background:var(--vermelho);margin-top:8px" id="btn-cancel">Cancelar entrega</button>
    </div>`:''}
  </div></div>`);
  const ov=document.getElementById('ov');
  ov.onclick=ev=>{if(ev.target.id==='ov')ov.remove();};
  document.getElementById('fx').onclick=()=>ov.remove();
  if(d.status==='ativa'){
    document.getElementById('btn-cancel').onclick=async()=>{
      const r=document.getElementById('cr').value.trim();
      if(!r){alert('Informe o motivo do cancelamento.');return;}
      const{error}=await sb.rpc('cancelar_entrega',{p_delivery_id:d.id,p_reason:r,p_user_id:USER.id});
      if(error){alert('Erro: '+error.message);return;}
      ov.remove();await loadUniData();showToast('Entrega cancelada — estoque revertido.');renderApp();
    };
  }
}

      <table><thead><tr><th>Colaborador</th><th>Planta</th><th>Setor</th><th>Itens</th><th>Data</th><th>Status</th></tr></thead>

function openReqDrawer(id){

}

    <span>${uItem(i.item_id)} ${uSize(i.size_id)}</span>
    <b>${i.qty_ordered} pedido / ${i.qty_received} recebido</b></div>`).join('');

  const receiveSection=canReceive&&['pedido_realizado','aguardando_recebimento','recebido_parcial','em_atraso'].includes(o.status)?`

      <div id="rec-lines" style="margin-top:10px;display:flex;flex-direction:column;gap:6px">
        ${(o.unif_purchase_order_items||[]).map(i=>`<div style="display:flex;gap:8px;align-items:center">
          <span style="flex:1;font-size:13px">${uItem(i.item_id)} ${uSize(i.size_id)}</span>
          <input class="rec-qty" data-it="${i.item_id}" data-sz="${i.size_id}" type="number" min="0" value="${i.qty_ordered-i.qty_received}" style="width:80px;padding:8px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit;outline:none"/>

    <div class="kv"><span>Planta</span><b>${uPlant(o.plant_id)}</b></div>

    <div class="kv"><span>Prazo</span><b>${uDate(o.expected_date)}</b></div>

  ov.onclick=ev=>{if(ev.target.id==='ov')ov.remove();};
  document.getElementById('fx').onclick=()=>ov.remove();
  if(document.getElementById('btn-receive')){
    document.getElementById('btn-receive').onclick=async()=>{
      const items=[];
      document.querySelectorAll('.rec-qty').forEach(inp=>{

    const{data:inv,error}=await sb.from('unif_inventory').insert({plant_id:plant,started_by:USER.id}).select('id').single();
    if(error){alert('Erro: '+error.message);return;}
    invId=inv.id;
    const stockItems=U_STOCK.filter(s=>s.plant_id===plant);
    if(!stockItems.length){alert('Nenhum item cadastrado nesta planta. Acesse Cadastros para configurar o estoque mínimo.');return;}
    // Inserir linhas do inventário
    const lines=stockItems.map(s=>({inventory_id:invId,item_id:s.item_id,size_id:s.size_id,qty_expected:s.qty_available}));
    const{data:invItems,error:ie}=await sb.from('unif_inventory_items').insert(lines).select();
    if(ie){alert('Erro ao criar linhas: '+ie.message);return;}
    const reasonOpts=ADJUST_REASONS.map(r=>`<option>${r}</option>`).join('');
    document.getElementById('ui-tb').innerHTML=invItems.map(i=>`<tr data-iid="${i.id}">
      <td>${uItem(i.item_id)}</td><td>${uSize(i.size_id)}</td>
      <td>${i.qty_expected}</td>
      <td><input type="number" min="0" value="${i.qty_expected}" class="icount" style="width:70px;padding:7px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;text-align:center"/></td>
      <td class="idiff" style="font-weight:700">0</td>
      <td><select class="ireason" style="padding:7px 10px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:12px;font-family:inherit"><option value="">Sem ajuste</option>${reasonOpts}</select></td>
    </tr>`).join('');
    document.querySelectorAll('.icount').forEach(inp=>{
      inp.oninput=()=>{
        const tr=inp.closest('tr');const exp=parseInt(tr.querySelector('td:nth-child(3)').textContent);
        const cnt=parseInt(inp.value)||0;const diff=cnt-exp;
        const dc=tr.querySelector('.idiff');dc.textContent=diff===0?'0':(diff>0?'+':'')+diff;
        dc.style.color=diff===0?'var(--ink)':diff>0?'var(--verde)':'var(--vermelho)';
      };
    });
    document.getElementById('ui-form').style.display='block';
  };

  document.getElementById('ui-save').onclick=async()=>{
    if(!invId)return;
    const msg=document.getElementById('ui-msg');
    const items=[];
    document.querySelectorAll('#ui-tb tr[data-iid]').forEach(tr=>{
      items.push({
        inventory_item_id:tr.dataset.iid,
        qty_counted:parseInt(tr.querySelector('.icount').value)||0,
        adjust_reason:tr.querySelector('.ireason').value||null
      });
    });
    msg.style.color='var(--muted)';msg.textContent='Concluindo…';
    const{error}=await sb.rpc('concluir_inventario',{p_inventory_id:invId,p_items:items,p_user_id:USER.id});
    if(error){msg.style.color='var(--vermelho)';msg.textContent='Erro: '+error.message;return;}
    await loadUniData();showToast('Inventário concluído — estoque ajustado.');UTAB='u_estoque';renderApp();
  };
}

// ── AUDITORIA ─────────────────────────────────────────────────
function uAudit(){
  const V=document.getElementById('view');
  const ACTION_LABELS={entrega_registrada:'Entrega registrada',entrega_cancelada:'Entrega cancelada',recebimento_confirmado:'Recebimento confirmado',inventario_concluido:'Inventário concluído'};
  const rows=U_AUDIT.slice(0,200).map(a=>`<tr>
    <td style="font-size:12px">${a.created_at?new Date(a.created_at).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'}):'—'}</td>
    <td>${ACTION_LABELS[a.action]||a.action}</td>
    <td>${a.entity}</td>
    <td style="font-size:12px;color:var(--muted)">${a.plant_id?uPlant(a.plant_id):'—'}</td>
    <td style="font-size:11px;max-width:200px;word-break:break-word">${a.new_value?JSON.stringify(a.new_value).slice(0,80):'—'}</td>
  </tr>`).join('');
  V.innerHTML=`<h2 class="page">Auditoria — Uniformes</h2>
    <p class="sub">Registro completo de operações. Visível apenas para o owner.</p>
    <section class="block">
      <table><thead><tr><th>Data/hora</th><th>Ação</th><th>Entidade</th><th>Planta</th><th>Dados</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" class="muted" style="text-align:center;padding:20px">Nenhum evento registrado.</td></tr>'}</tbody></table>
    </section>`;
}

// ── CADASTROS ─────────────────────────────────────────────────
function uCadastros(){
  const V=document.getElementById('view');
  let cadastroTab='plantas';
  const render=()=>{
    const tabs=[['plantas','Plantas'],['itens','Itens'],['tamanhos','Tamanhos'],['fornecedores','Fornecedores'],['estoq_min','Estoque mínimo']];
    const tabNav=tabs.map(([k,l])=>`<button class="btn ${cadastroTab===k?'':'g'}" data-ct="${k}" style="font-size:12px;padding:7px 14px">${l}</button>`).join('');
    let content='';
    if(cadastroTab==='plantas'){
      const rows=U_PLANTS.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.code)}</td><td><span class="pill ${p.active?'c-grn':'c-gry'}">${p.active?'Ativo':'Inativo'}</span></td></tr>`).join('');
      content=`<table><thead><tr><th>Nome</th><th>Código</th><th>Status</th></tr></thead><tbody>${rows||noData(3)}</tbody></table>
        <div style="margin-top:16px;display:flex;gap:8px">
          <input id="pname" class="finp" placeholder="Nome da planta" style="padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit"/>
          <input id="pcode" class="finp" placeholder="Código (ex: ACO)" style="width:120px;padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit"/>
          <button class="btn" id="padd">Adicionar</button>
        </div>`;
    } else if(cadastroTab==='itens'){
      const rows=U_ITEMS.map(i=>`<tr><td>${esc(i.name)}</td><td>${esc(i.description||'—')}</td><td><span class="pill ${i.active?'c-grn':'c-gry'}">${i.active?'Ativo':'Inativo'}</span></td></tr>`).join('');
      content=`<table><thead><tr><th>Nome</th><th>Descrição</th><th>Status</th></tr></thead><tbody>${rows||noData(3)}</tbody></table>
        <div style="margin-top:16px;display:flex;gap:8px">
          <input id="iname" class="finp" placeholder="Nome do item (ex: Calça)" style="padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit"/>
          <input id="idesc" class="finp" placeholder="Descrição" style="padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit"/>
          <button class="btn" id="iadd">Adicionar</button>
        </div>`;
    } else if(cadastroTab==='tamanhos'){
      const rows=U_SIZES.map(s=>`<tr><td>${esc(s.code)}</td><td>${s.sort_order}</td><td><span class="pill ${s.active?'c-grn':'c-gry'}">${s.active?'Ativo':'Inativo'}</span></td></tr>`).join('');
      content=`<table><thead><tr><th>Código</th><th>Ordem</th><th>Status</th></tr></thead><tbody>${rows||noData(3)}</tbody></table>
        <div style="margin-top:16px;display:flex;gap:8px">
          <input id="scode" class="finp" placeholder="Código (ex: XXG)" style="width:120px;padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit"/>
          <input id="sord" class="finp" type="number" placeholder="Ordem" style="width:80px;padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit"/>
          <button class="btn" id="sadd">Adicionar</button>
        </div>`;
    } else if(cadastroTab==='fornecedores'){
      const rows=U_PLANTS.length===0?noData(3):'';
      // Carrega fornecedores separadamente
      content=`<p class="muted" id="supp-load">Carregando…</p>`;
    } else if(cadastroTab==='estoq_min'){
      const rows=U_STOCK.map(s=>`<tr>
        <td>${uPlant(s.plant_id)}</td><td>${uItem(s.item_id)}</td><td>${uSize(s.size_id)}</td>
        <td>${s.qty_available}</td>
        <td><input type="number" class="em-min" data-id="${s.id}" value="${s.qty_minimum}" min="0" style="width:70px;padding:7px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;text-align:center"/></td>
      </tr>`).join('');
      content=`<p class="note">Altere o mínimo e clique em "Salvar mínimos".</p>
        <table><thead><tr><th>Planta</th><th>Item</th><th>Tamanho</th><th>Disponível</th><th>Mínimo</th></tr></thead>
        <tbody>${rows||noData(5)}</tbody></table>
        <button class="btn" id="em-save" style="margin-top:14px">Salvar mínimos</button>`;
    }

    document.getElementById('cad-content').innerHTML=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${tabNav}</div>
      <div>${content}</div>`;

    document.querySelectorAll('[data-ct]').forEach(b=>b.onclick=()=>{cadastroTab=b.dataset.ct;render();});

    if(cadastroTab==='plantas'){
      document.getElementById('padd').onclick=async()=>{
        const name=document.getElementById('pname').value.trim(),code=document.getElementById('pcode').value.trim().toUpperCase();
        if(!name||!code){alert('Preencha nome e código.');return;}
        const{error}=await sb.from('unif_plants').insert({name,code,created_by:USER.id});
        if(error){alert('Erro: '+error.message);return;}
        await loadUniData();showToast('Planta adicionada.');render();
      };
    } else if(cadastroTab==='itens'){
      document.getElementById('iadd').onclick=async()=>{
        const name=document.getElementById('iname').value.trim(),desc=document.getElementById('idesc').value.trim();
        if(!name){alert('Informe o nome do item.');return;}
        const{error}=await sb.from('unif_items').insert({name,description:desc||null,created_by:USER.id});
        if(error){alert('Erro: '+error.message);return;}
        await loadUniData();showToast('Item adicionado.');render();
      };
    } else if(cadastroTab==='tamanhos'){
      document.getElementById('sadd').onclick=async()=>{
        const code=document.getElementById('scode').value.trim().toUpperCase(),ord=parseInt(document.getElementById('sord').value)||0;
        if(!code){alert('Informe o código do tamanho.');return;}
        const{error}=await sb.from('unif_sizes').insert({code,name:code,sort_order:ord});
        if(error){alert('Erro: '+error.message);return;}
        await loadUniData();showToast('Tamanho adicionado.');render();
      };
    } else if(cadastroTab==='fornecedores'){
      sb.from('unif_suppliers').select('*').order('name').then(({data})=>{
        const rows=(data||[]).map(s=>`<tr><td>${esc(s.name)}</td><td>${esc(s.cnpj||'—')}</td><td><span class="pill ${s.active?'c-grn':'c-gry'}">${s.active?'Ativo':'Inativo'}</span></td></tr>`).join('');
        document.getElementById('supp-load').outerHTML=`<table><thead><tr><th>Nome</th><th>CNPJ</th><th>Status</th></tr></thead><tbody>${rows||noData(3)}</tbody></table>
          <div style="margin-top:16px;display:flex;gap:8px">
            <input id="fname" class="finp" placeholder="Nome do fornecedor" style="flex:1;padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit"/>
            <input id="fcnpj" class="finp" placeholder="CNPJ (opcional)" style="width:160px;padding:10px 12px;border:1.5px solid var(--linha);border-radius:var(--r-xs);font-size:13px;font-family:inherit"/>
            <button class="btn" id="fadd">Adicionar</button>
          </div>`;
        document.getElementById('fadd').onclick=async()=>{
          const name=document.getElementById('fname').value.trim();
          if(!name){alert('Informe o nome.');return;}
          const{error}=await sb.from('unif_suppliers').insert({name,cnpj:document.getElementById('fcnpj').value.trim()||null,created_by:USER.id});
          if(error){alert('Erro: '+error.message);return;}
          showToast('Fornecedor adicionado.');render();
        };
      });
    } else if(cadastroTab==='estoq_min'){
      document.getElementById('em-save').onclick=async()=>{
        const updates=[];
        document.querySelectorAll('.em-min').forEach(inp=>{
          updates.push(sb.from('unif_stock').update({qty_minimum:parseInt(inp.value)||0}).eq('id',inp.dataset.id));
        });
        await Promise.all(updates);
        await loadUniData();showToast('Mínimos atualizados.');render();
      };
    }
  };
  const noData=cols=>`<tr><td colspan="${cols}" class="muted" style="text-align:center;padding:20px">Nenhum registro.</td></tr>`;
  V.innerHTML=`<h2 class="page">Cadastros</h2>
    <p class="sub">Manutenção de plantas, itens, tamanhos, fornecedores e mínimos de estoque.</p>
    <section class="block"><div id="cad-content"></div></section>`;
  render();
}

boot();
</script>
</body>
</html>
